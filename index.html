<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltMaster Pro v1.8.21 - ST Compliance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
    body { background: #0f172a; color: #e2e8f0; }
   .card { background: #1e293b; border: 1px solid #334155; }
   .input-dark { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; }
   .btn-primary { background: #f59e0b; color: #0f172a; font-weight: 700; }
   .btn-primary:hover { background: #d97706; }
   .btn-secondary { background: #334155; color: #e2e8f0; }
   .tooltip { position: relative; display: inline-block; cursor: help; color: #f59e0b; }
   .tooltip .tooltiptext { visibility: hidden; width: 280px; background-color: #0f172a; color: #e2e8f0; text-align: left; border-radius: 6px; padding: 8px; position: absolute; z-index: 10; bottom: 125%; left: 50%; margin-left: -140px; opacity: 0; transition: opacity 0.3s; border: 1px solid #475569; font-size: 12px; }
   .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
   .output-box { background: #0f172a; border: 1px solid #334155; font-family: 'Courier New', monospace; font-size: 12px; white-space: pre-wrap; }
   .critical-warn { color: #f97316; font-weight: bold; }
   .fail { color: #ef4444; font-weight: bold; }
   .pass { color: #22c55e; font-weight: bold; }
</style>
</head>
<body class="p-4 md:p-6">
<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-amber-400 mb-2">VoltMaster Pro v1.8.21</h1>
    <p class="text-slate-400 mb-6">ST/MS IEC 60364 Compliance Calculator - Domestic/Commercial</p>

    <div class="grid lg:grid-cols-2 gap-6">
        <!-- INPUT SECTION -->
        <div class="space-y-4">
            <div class="card p-4 rounded-lg">
                <h2 class="text-lg font-bold text-green-400 mb-3">1. Project Info</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Project Name</label><input id="projectName" class="input-dark w-full p-2 rounded" value="Rumah Teres"></div>
                    <div><label>Competent Person</label><input id="competentPerson" class="input-dark w-full p-2 rounded" value="PW4-12345"></div>
                </div>
            </div>

            <div class="card p-4 rounded-lg">
                <h2 class="text-lg font-bold text-green-400 mb-3">2. System Configuration</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Supply System</label><select id="phase" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="1">1-Phase (230V)</option>
                        <option value="3">3-Phase (400V)</option>
                    </select></div>
                    <div><label>Diversity (DF)</label><input id="diversity" class="input-dark w-full p-2 rounded bg-slate-800" value="Auto" disabled></div>
                    <div><label>Power Factor <span class="tooltip">ⓘ<span class="tooltiptext">Typical: 0.85 for Residential, 0.90+ for Commercial with Power Factor Correction</span></span></label><input id="pf" value="0.85" type="number" step="0.01" min="0.5" max="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Harmonic Load % <span class="tooltip">ⓘ<span class="tooltiptext">LED, PC, Inverter loads. >33% requires neutral derating per BS7671 523.6.3</span></span></label><input id="harmonic" value="30" type="number" min="0" max="100" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Wiring Style</label><select id="wiring" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="pvc">High Impact PVC Conduit</option>
                        <option value="trunking">PVC Trunking</option>
                    </select></div>
                    <div><label>Installation Method <span class="tooltip">ⓘ<span class="tooltiptext">BS7671 Table 4D1A. Affects Iz current carrying capacity rating</span></span></label><select id="installMethod" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="C">Method C - Clipped Direct</option>
                        <option value="A">Method A - Enclosed Conduit</option>
                        <option value="B">Method B - Conduit on Wall</option>
                    </select></div>
                    <div class="col-span-2"><label>Protection Mode <span class="tooltip">ⓘ<span class="tooltiptext">RCBO = Combined MCB+RCD. Provides better discrimination vs MCB+RCD separate</span></span></label><select id="protectionMode" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="mcb_rcd">MCB + RCD Separate</option>
                        <option value="rcbo">RCBO Hybrid</option>
                    </select></div>
                </div>
            </div>

            <div class="card p-4 rounded-lg">
                <h2 class="text-lg font-bold text-green-400 mb-3">3. Load Details</h2>
                <div class="grid grid-cols-3 gap-3">
                    <div><label>Lights (qty)</label><input id="light" value="8" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Fans (qty)</label><input id="fan" value="4" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Sockets (pt)</label><input id="socket" value="10" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>AC 1HP (qty)</label><input id="ac1" value="2" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>AC 1.5HP (qty)</label><input id="ac15" value="1" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>AC 2HP (qty)</label><input id="ac2" value="0" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Heater (qty)</label><input id="heater" value="2" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Outdoor Light</label><input id="outdoor" value="4" type="number" min="0" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Ring Circuit</label><select id="ring" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="0">No</option>
                        <option value="1">Yes - Kitchen</option>
                    </select></div>
                </div>
            </div>

            <div class="card p-4 rounded-lg">
                <h2 class="text-lg font-bold text-green-400 mb-3">4. Technical Parameters</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Earthing System</label><select id="earthSys" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="TT">TT (Standard Malaysia)</option>
                        <option value="TN-S">TN-S</option>
                    </select></div>
                    <div><label>Earth Resistance (Ω)</label><input id="earthRes" value="1.0" type="number" step="0.1" min="0.1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Main MCB Curve</label><select id="mcbCurve" class="input-dark w-full p-2 rounded" onchange="calc()">
                        <option value="C">Type C</option>
                        <option value="B">Type B</option>
                        <option value="D">Type D</option>
                    </select></div>
                    <div><label>Ze L-N (Ω)</label><input id="ze" value="0.35" type="number" step="0.01" min="0.01" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>TNB Fault Level (kA) <span class="tooltip">ⓘ<span class="tooltiptext">Check with TNB. Domestic 6kA, Commercial 10kA+. Used for MCB breaking capacity check per IEC 60947-2</span></span></label><input id="tnbFault" value="6" type="number" step="0.5" min="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Ring Load Factor</label><input id="ringLoad" value="2.5" type="number" step="0.1" min="2" max="3" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Light (W)/unit</label><input id="wLight" value="15" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Fan (W)/unit</label><input id="wFan" value="75" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Exhaust (W)/unit</label><input id="wExhaust" value="40" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Socket (W)/pt</label><input id="wSocket" value="250" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Heater (W)/unit</label><input id="wHeater" value="3000" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Outdoor Light (W)</label><input id="wOutdoor" value="15" type="number" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>AC Efficiency (0-1)</label><input id="acEff" value="0.85" type="number" step="0.01" min="0.5" max="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>TNB to DB (m)</label><input id="lenMain" value="10" type="number" min="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>DB to Point (m)</label><input id="lenFinal" value="20" type="number" min="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Ca (Ambient)</label><input id="ca" value="1.0" type="number" step="0.01" min="0.5" max="1.5" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Cg (Grouping)</label><input id="cg" value="0.8" type="number" step="0.01" min="0.5" max="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                    <div><label>Ci (Thermal)</label><input id="ci" value="1.0" type="number" step="0.01" min="0.5" max="1" class="input-dark w-full p-2 rounded" oninput="calc()"></div>
                </div>
            </div>

            <button onclick="calc()" class="btn-primary w-full p-3 rounded-lg text-lg">⚡ GENERATE REPORT</button>
            <button onclick="pdf()" class="btn-secondary w-full p-3 rounded-lg">📄 Export PDF</button>
            <button onclick="exportSLDPdf()" class="btn-secondary w-full p-3 rounded-lg">📐 Export SLD PDF</button>
        </div>

        <!-- OUTPUT SECTION -->
        <div class="card p-4 rounded-lg">
            <h2 class="text-lg font-bold text-amber-400 mb-3">Report Output</h2>
            <div id="out" class="output-box p-4 rounded min-h-[600px]"></div>
        </div>
    </div>
</div>

<script>
// GLOBAL CONSTANTS - MS IEC 60364 / BS7671
const VOLT_1PH = 230, VOLT_3PH = 400;
const mvAM_1ph = {1.5: 29, 2.5: 18, 4: 11, 6: 7.3, 10: 4.4, 16: 2.8, 25: 1.75, 35: 1.25};
const mvAM_3ph = {1.5: 25, 2.5: 15, 4: 9.5, 6: 6.4, 10: 3.8, 16: 2.4, 25: 1.5, 35: 1.1};
const mcbSizes = [6,10,16,20,25,32,40,50,63,80,100];
const izTableMethod = {
    'A': {1.5: 15.5, 2.5: 21, 4: 28, 6: 36, 10: 50, 16: 68, 25: 89, 35: 110},
    'B': {1.5: 17.5, 2.5: 24, 4: 32, 6: 41, 10: 57, 16: 76, 25: 101, 35: 125},
    'C': {1.5: 20, 2.5: 27, 4: 37, 6: 47, 10: 65, 16: 85, 25: 112, 35: 138}
};

let bomData = [];
window.currentSLD = "";

function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }
function getValStr(id) { return document.getElementById(id).value; }

function calc() {
    const phase = parseInt(getValStr('phase'));
    const globalPF = getVal('pf');
    const harmonicPct = getVal('harmonic') / 100;
    const installMethod = getValStr('installMethod');
    const protectionMode = getValStr('protectionMode');
    const earthSys = getValStr('earthSys');
    const earthRes = getVal('earthRes');
    const ze = getVal('ze');
    const tnbFault = getVal('tnbFault');
    const lenMain = getVal('lenMain');
    const lenFinal = getVal('lenFinal');
    const ca = getVal('ca'), cg = getVal('cg'), ci = getVal('ci');
    const derating = ca * cg * ci;
    const ringLoad = getVal('ringLoad');

    // Load Watts
    const wLight = getVal('wLight'), wFan = getVal('wFan'), wExhaust = getVal('wExhaust');
    const wSocket = getVal('wSocket'), wHeater = getVal('wHeater'), wOutdoor = getVal('wOutdoor');
    const acEff = getVal('acEff');

    // Load Qty
    const qLight = getVal('light'), qFan = getVal('fan'), qSocket = getVal('socket');
    const qAC1 = getVal('ac1'), qAC15 = getVal('ac15'), qAC2 = getVal('ac2');
    const qHeater = getVal('heater'), qOutdoor = getVal('outdoor');
    const isRing = getVal('ring') === 1;

    // Connected Load
    const clL = qLight * wLight, clF = qFan * wFan, clS = qSocket * wSocket;
    const clAC = (qAC1 * 746 + qAC15 * 1119 + qAC2 * 1492) / acEff;
    const clH = qHeater * wHeater, clO = qOutdoor * wOutdoor;
    const clExh = 2 * wExhaust; // Assume 2 exhaust
    const totalCL = clL + clF + clS + clAC + clH + clO + clExh;

    // ST Diversity Table 1B - Domestic
    let mdL = clL, mdF = clF * 0.66, mdS = 0;
    if (clS <= 5000) mdS = clS;
    else mdS = 5000 + (clS - 5000) * 0.4;
    let mdAC = 0;
    const acTotal = qAC1 + qAC15 + qAC2;
    if (acTotal > 0) mdAC = (clAC / acTotal) + (acTotal - 1) * (clAC / acTotal) * 0.75;
    let mdH = 0;
    if (qHeater > 0) mdH = wHeater + (qHeater - 1) * wHeater * 0.75;
    let mdO = clO, mdExh = clExh * 0.66;
    const totalMD = mdL + mdF + mdS + mdAC + mdH + mdO + mdExh;

    // Current
    const VOLT = phase === 3? VOLT_3PH : VOLT_1PH;
    const Ib = totalMD / (VOLT * globalPF * (phase === 3? 1.732 : 1));
    const In = Ib * 1.25; // 125% for MCB sizing
    const mainMCB = mcbSizes.find(s => s >= In) || 100;

    // Main Cable Sizing - FIX: Show Iz
    let mainCab = 16;
    for (let size of [1.5,2.5,4,6,10,16,25,35]) {
        const izBase = izTableMethod[installMethod][size] || 20;
        const izDerated = izBase * derating;
        if (izDerated >= mainMCB) { mainCab = size; break; }
    }
    const izMainBase = izTableMethod[installMethod][mainCab];
    const izMain = izMainBase * derating;
    const mainCableStatus = izMain >= mainMCB? "OK" : "UNDERSIZED";

    // Voltage Drop - FIX: Ring factor 2.5, 3-phase /400V
    const getVdLine = (watt, cableVal, length, isRing = false, isResistive = false) => {
        const activePF = isResistive? 1.0 : globalPF;
        const iLine = watt / (VOLT_1PH * activePF);
        const mvLine = phase === 3? (mvAM_3ph[cableVal.toFixed(1)] || 15) : (mvAM_1ph[cableVal.toFixed(1)] || 29);
        let vdVal = phase === 3? (1.732 * mvLine * iLine * length) / 1000 : (mvLine * iLine * length * 2) / 1000;
        if (isRing) vdVal = vdVal / ringLoad; // FIX: Use ringLoad input, default 2.5
        const vdPct = (vdVal / (phase === 3? VOLT_3PH : VOLT_1PH)) * 100;
        return { v: vdVal.toFixed(2), pct: vdPct.toFixed(2), i: iLine.toFixed(2) };
    };

    // Main VD
    const mainVD = getVdLine(totalMD, mainCab, lenMain, false);

    // Worst Final Circuit VD - Socket Ring
    const socketVD = getVdLine(wSocket, 2.5, lenFinal, isRing, false);
    const totalVD = parseFloat(mainVD.v) + parseFloat(socketVD.v);
    const totalVDPct = (totalVD / (phase === 3? VOLT_3PH : VOLT_1PH)) * 100;
    const vdStatus = totalVDPct <= 4.0? "PASS" : "EXCEEDS 4% LIMIT";

    // Harmonic Neutral - BS7671 523.6.3
    let neutralFactor = 1.0;
    if (harmonicPct > 0.33) neutralFactor = 2.0;
    const neutralIb = Ib * neutralFactor;

    // TT Earth Check
    const touchVoltage = earthRes * 0.1; // 100mA RCD
    const ttStatus = touchVoltage <= 50? "PASS" : "FAIL";

    // Breaking Capacity
    const breakingCapacity = mainMCB <= 63? 6 : 10;
    const pscStatus = tnbFault <= breakingCapacity? "ADEQUATE" : "INADEQUATE";

    // RCD Sizing
    const mainRCDType = phase === 1? "2P" : "4P";
    const mainRCDRating = "100mA Type S";

    // BOM
    bomData = [
        {item: `Main MCB ${mainMCB}A Type ${getValStr('mcbCurve')}`, qty: 1, unit: "nos"},
        {item: `Main RCD ${mainRCDType} ${mainRCDRating}`, qty: 1, unit: "nos"},
        {item: `Incoming Cable ${mainCab}mm² Cu/PVC/PVC`, qty: lenMain, unit: "m"},
        {item: `Earth Cable ${mainCab >= 16? 16 : 10}mm²`, qty: lenMain, unit: "m"},
        {item: `Earth Rod 16mm x 1.5m`, qty: 2, unit: "nos"},
        {item: `DB 12-way Metalclad`, qty: 1, unit: "nos"}
    ];

    // SLD Generation - FIX: ASCII box + notes
    window.currentSLD = generateSLD(phase, mainMCB, mainCab, mainRCDType, earthSys);

    // Report Output
    let out = `╔══════════════════════════════════╗
║ VOLTMASTER PRO v1.8.21 - ST/MS IEC 60364 COMPLIANCE REPORT ║
╚══════════════════════════════════════════════════════════════════╝

[1] PROJECT DETAILS
──────────────────────────────────────────────────────────────────
Project Name : ${getValStr('projectName')}
Competent Person : ${getValStr('competentPerson')} (PW4)
Supply System : ${phase}-Phase ${VOLT}V ${phase === 3? '4-Wire' : '2-Wire'}
Earthing System : ${earthSys}
Standard : MS IEC 60364 / BS7671 / ST Guidelines
Date : ${new Date().toLocaleString('en-GB')}

[2] LOAD CALCULATION - ST DIVERSITY TABLE 1B
──────────────────────────────────────────────────────────────────
Connected Load : ${(totalCL/1000).toFixed(2)} kW
Maximum Demand : ${(totalMD/1000).toFixed(2)} kW
Diversity Factor : ${(totalMD/totalCL*100).toFixed(1)}%
Design Current Ib : ${Ib.toFixed(2)} A
Power Factor : ${globalPF}
Harmonic Load : ${(harmonicPct*100).toFixed(0)}% ${harmonicPct > 0.33? '(Neutral 200%)' : ''}

[3] MAIN PROTECTION & CABLE SIZING
──────────────────────────────────────────────────────────────────
Main MCB Size : ${mainMCB}A Type ${getValStr('mcbCurve')}
Main RCD : ${mainRCDType} ${mainRCDRating}
Incoming Cable : ${mainCab}mm² Cu/PVC/PVC | Iz: ${izMain.toFixed(1)}A (${installMethod}) ${mainCableStatus}
Derating Factor : Ca=${ca} x Cg=${cg} x Ci=${ci} = ${derating.toFixed(2)}
Breaking Capacity : ${breakingCapacity} kA (TNB: ${tnbFault}kA) ${pscStatus}
Neutral Current : ${neutralIb.toFixed(2)}A ${harmonicPct > 0.33? '(200% due to harmonics)' : ''}

[4] VOLTAGE DROP ANALYSIS - MS IEC 60364-5-52
──────────────────────────────────────────────────────────────────
TNB to DB : ${mainVD.v}V (${mainVD.pct}%) | ${lenMain}m ${mainCab}mm²
DB to Socket : ${socketVD.v}V (${socketVD.pct}%) | ${lenFinal}m 2.5mm² ${isRing? 'Ring' : 'Radial'}
TOTAL VD : ${totalVD.toFixed(2)}V (${totalVDPct.toFixed(2)}%) ${vdStatus}
Limit : 4.0% Max (MS IEC 60364-5-52)

[5] EARTHING & PROTECTION - ${earthSys} SYSTEM
──────────────────────────────────────────────────────────────────
Earth Resistance : ${earthRes} Ω
Touch Voltage : ${touchVoltage.toFixed(1)}V (Ra x IΔn) ${ttStatus} (≤50V)
Ze L-N : ${ze} Ω
RCD Requirement : 30mA for Socket, 10mA for Water Heater (Per. 36)
${earthSys === 'TT'? 'Main RCD 100mA Type S mandatory for TT system' : ''}

[6] ST CRITICAL WARNINGS
──────────────────────────────────────────────────────────────────`;

    if (vdStatus.includes("EXCEEDS")) out += `\n<span class="fail">⚠ CRITICAL: Total VD ${totalVDPct.toFixed(2)}% exceeds 4% limit. Upsize main cable or reduce length.</span>`;
    if (mainCableStatus === "UNDERSIZED") out += `\n<span class="fail">⚠ CRITICAL: Main cable ${mainCab}mm² Iz=${izMain.toFixed(1)}A < MCB ${mainMCB}A. Upsize cable.</span>`;
    if (ttStatus === "FAIL") out += `\n<span class="fail">⚠ CRITICAL: Touch voltage ${touchVoltage.toFixed(1)}V > 50V. Improve earthing to <0.5Ω.</span>`;
    if (pscStatus === "INADEQUATE") out += `\n<span class="fail">⚠ CRITICAL: MCB breaking capacity ${breakingCapacity}kA < TNB fault ${tnbFault}kA. Upsize MCB.</span>`;
    if (harmonicPct > 0.33) out += `\n<span class="critical-warn">⚠ WARNING: Harmonic load ${(harmonicPct*100).toFixed(0)}% > 33%. Neutral conductor sized at 200% per BS7671 523.6.3</span>`;
    if (!out.includes("CRITICAL") &&!out.includes("WARNING")) out += `\n<span class="pass">✓ All ST/MS IEC 60364 requirements PASSED</span>`;

    out += `

[7] SINGLE LINE DIAGRAM
──────────────────────────────────────────────────────────────────
${window.currentSLD}

[8] BILL OF MATERIALS (BOM)
──────────────────────────────────────────────────────────────────
${bomData.map(i => `${i.item.padEnd(40)} ${i.qty.toString().padStart(3)} ${i.unit}`).join('\n')}

══════════════════════════════════
IMPORTANT LEGAL NOTICE:
This report is generated for preliminary estimation purposes ONLY.
It MUST be verified and formally endorsed by a registered Competent
Person (Wireman PW4 or Professional Electrical Engineer) in accordance
with the Electricity Regulations 1994 before any physical installation.
══════════════════════════════════`;

    document.getElementById('out').innerHTML = out;
}

function generateSLD(phase, mainMCB, mainCab, mainRCDType, earthSys) {
    const ph = phase === 3? "3-Phase 4-Wire" : "1-Phase 2-Wire";
    return `
TNB SUPPLY ${ph} 230/400V
      │
      │ ${mainCab}mm² Cu/PVC/PVC
      ▼
┌─────────────┐
│ Main MCB │ ${mainMCB}A Type C
│ ${mainRCDType} RCD │ 100mA Type S
└─────────────┘
      │
      ├─────► Light Circuit 6A MCB 1.5mm²
      ├─────► Power Circuit 16A MCB 2.5mm² + RCD 30mA
      ├─────► AC Circuit 20A MCB 4.0mm²
      └─────► Heater Circuit 20A MCB 4.0mm² + RCD 10mA

EARTHING: ${earthSys} System
Main Earth: ${mainCab >= 16? 16 : 10}mm² to Earth Electrode
RCD: All socket outlets protected by 30mA RCD per Regulation 36
     Water heater protected by 10mA RCD per Regulation 36(2)

SURUHANJAYA TENAGA COMPLIANCE:
- Voltage Drop <4% per MS IEC 60364-5-52
- Diversity per ST Guidelines Table 1B Domestic
- Breaking Capacity per IEC 60947-2
- Earthing per Regulation 36 Electricity Regulations 1994`;
}

// FIX: Export PDF - innerText + error handler
async function pdf() {
    try {
        const { jsPDF } = window.jspdf;
        let doc = new jsPDF('p', 'mm', 'a4');
        const pageHeight = doc.internal.pageSize.height;
        const pageWidth = doc.internal.pageSize.width;
        let pageNum = 1;

        function addHeader() {
            doc.setFont("helvetica", "bold"); doc.setFontSize(14);
            doc.text("VOLTMASTER PRO v1.8.21", pageWidth/2, 15, {align: "center"});
            doc.setFontSize(10);
            doc.text("NOT FOR DIRECT CONSTRUCTION / INSTALLATION", pageWidth/2, 21, {align: "center"});
            doc.text("PRELIMINARY DESIGN ESTIMATION ONLY", pageWidth/2, 26, {align: "center"});
            doc.setLineWidth(0.5); doc.line(15, 28, pageWidth-15, 28);
        }

function addFooter() {
            doc.setFont("helvetica", "normal"); doc.setFontSize(8);
            doc.text(`Page ${pageNum}`, pageWidth-20, pageHeight-10);
            doc.text(`Generated: ${new Date().toLocaleString('en-GB')}`, 15, pageHeight-10);
        }

        addHeader();
        let y = 35;

        // FIX: Use innerText to strip HTML
        const htmlContent = document.getElementById('out');
        const reportText = htmlContent.innerText;
        const lines = reportText.split('\n');
        doc.setFont("courier", "normal"); doc.setFontSize(9);

        for(let i = 0; i < lines.length; i++) {
            let line = lines[i];
            if (y > pageHeight - 25) {
                addFooter(); doc.addPage(); pageNum++; addHeader(); y = 35;
            }
            if (line.includes("EXCEEDS 4% LIMIT") || line.includes("FAILED") || line.includes("CRITICAL")) {
                doc.setTextColor(239, 68, 68); doc.setFont("courier", "bold");
            } else if (line.includes("WARNING")) {
                doc.setTextColor(249, 115, 22); doc.setFont("courier", "bold");
            } else if (line.includes("===") || line.startsWith("[")) {
                doc.setTextColor(34, 197, 94); doc.setFont("courier", "bold");
            } else {
                doc.setTextColor(0, 0, 0); doc.setFont("courier", "normal");
            }
            const wrapped = doc.splitTextToSize(line, 180);
            doc.text(wrapped, 15, y);
            y += wrapped.length * 4.5;
        }

        if (bomData.length > 0) {
            if (y > pageHeight - 60) { addFooter(); doc.addPage(); pageNum++; addHeader(); y = 35; }
            doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(0,0,0);
            doc.text("BILL OF MATERIALS (BOM)", 15, y); y += 5;
            doc.autoTable({
                startY: y,
                head: [['Item', 'Qty', 'Unit']],
                body: bomData.map(i => [i.item, i.qty, i.unit]),
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 2, font: 'courier' },
                headStyles: { fillColor: [245, 158, 11], textColor: [2, 6, 23] }
            });
        }

        addFooter();
        doc.save("VoltMaster_v1.8.21_ST_Compliance_Report.pdf");
    } catch (e) {
        alert("PDF Export Error: " + e.message + "\n\nCheck console (F12) for details.");
        console.error("PDF Error:", e);
    }
}

// FIX: Export SLD PDF - font 7pt + split('\n') + margin 30mm
async function exportSLDPdf() {
    if (!window.currentSLD) return alert("Please generate report first!");
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF('p', 'mm', 'a4');
    const pageHeight = doc.internal.pageSize.height;
    const pageWidth = doc.internal.pageSize.width;
    let pageNum = 1;

    function addHeader() {
        doc.setFont("helvetica", "bold"); doc.setFontSize(12);
        doc.text("SINGLE LINE DIAGRAM (SLD) - SCHEMATIC", pageWidth/2, 20, {align: "center"});
        doc.setFontSize(9);
        doc.text("PRELIMINARY DESIGN - NOT FOR CONSTRUCTION", pageWidth/2, 25, {align: "center"});
        doc.setLineWidth(0.5); doc.line(15, 27, pageWidth-15, 27);
    }

    function addFooter() {
        doc.setFont("helvetica", "normal"); doc.setFontSize(7);
        doc.text(`Generated by VoltMaster Pro v1.8.21`, 15, pageHeight-15);
        doc.text(`Page ${pageNum}`, pageWidth-25, pageHeight-15);
        doc.setFont("helvetica", "bolditalic"); doc.setFontSize(7); doc.setTextColor(200, 0, 0);
        const disc = "IMPORTANT LEGAL NOTICE: This schematic diagram is generated for preliminary estimation purposes ONLY. It MUST be verified and formally endorsed by a registered Competent Person (Wireman PW4 or Professional Electrical Engineer) in accordance with the Electricity Regulations 1994 before any physical installation begins.";
        doc.text(doc.splitTextToSize(disc, pageWidth-30), 15, pageHeight-10);
        doc.setTextColor(0, 0, 0);
    }

    addHeader();

    // FIX: Guna monospace font 7pt + split('\n') untuk elak ASCII box pecah
    doc.setFont("courier", "normal"); doc.setFontSize(7);
    const lines = window.currentSLD.split('\n'); // JANGAN guna splitTextToSize

    let y = 35; // Margin 35mm dari atas
    const lineHeight = 3.5;
    const maxY = pageHeight - 30; // Margin 30mm bawah untuk footer

    for(let i = 0; i < lines.length; i++) {
        if(y > maxY) {
            addFooter();
            doc.addPage();
            pageNum++;
            addHeader();
            y = 35;
        }
        doc.text(lines[i], 15, y);
        y += lineHeight;
    }

    addFooter();
    doc.save("VoltMaster_v1.8.21_SLD_ST.pdf");
}

// Validate input ranges
function validateInput() {
    const inputs = ['pf','harmonic','ca','cg','ci','acEff','tnbFault','ze','earthRes'];
    inputs.forEach(id => {
        const el = document.getElementById(id);
        const val = parseFloat(el.value);
        const min = parseFloat(el.min);
        const max = parseFloat(el.max);
        if (val < min || val > max || isNaN(val)) {
            el.style.borderColor = '#ef4444';
        } else {
            el.style.borderColor = '#475569';
        }
    });
}

// Auto calculate on page load
window.onload = () => {
    calc();
    validateInput();
};
